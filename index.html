<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Status LK - සෙඩ් තත්ත්වය</title>
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "b36bb97b-1cbc-4fde-89c4-8e5f069ad68d",
          notifyButton: { enable: true },
        });
      });
    </script>

    <style>
        /* ☀️ Day Mode */
        :root { 
            --primary: #3498db; --success: #2ecc71; --warning: #f39c12; --danger: #e74c3c; 
            --bg-color: #f4f7f6; --card-bg: #ffffff; --text-main: #2c3e50;
            --text-muted: #666666; --border-color: #eeeeee; --meta-bg: #f8f9fa;
            --status-box: #eaf2f8; --update-box: #fdfefe;
        }

        /* 🌙 Night Mode */
        [data-theme="dark"] {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #f1f1f1;
            --text-muted: #aaaaaa; --border-color: #333333; --meta-bg: #2d2d2d;
            --primary: #2980b9; --status-box: #1a252f; --update-box: #212121;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; transition: 0.3s; }
        .container { max-width: 600px; margin: auto; position: relative; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .visitor-badge { background: var(--card-bg); color: var(--text-main); border: 2px solid var(--border-color); padding: 8px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .theme-btn { background: var(--card-bg); color: var(--text-main); border: 2px solid var(--border-color); padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.3s; }

        h1 { text-align: center; font-size: 24px; margin-top: 0; margin-bottom: 20px; }

        .station-card { background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid var(--border-color); }
        .station-header { padding: 20px; border-bottom: 1px solid var(--border-color); border-left: 5px solid var(--primary); }
        .station-header h3 { margin: 0; font-size: 22px; }
        .station-header p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 15px; }
        .dist-tag { display: inline-block; background: rgba(2, 136, 209, 0.1); color: #0288d1; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-top: 10px; }

        /* Current Status Section */
        .current-status { background: var(--status-box); padding: 20px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .current-status h4 { margin: 0 0 15px 0; color: var(--text-muted); text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }
        .status-grid { display: flex; flex-wrap: wrap; justify-content: space-around; gap: 15px; }
        .status-item { background: var(--card-bg); padding: 15px; border-radius: 10px; width: 45%; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid var(--border-color); }
        .status-item h5 { margin: 0 0 10px 0; font-size: 15px; }
        .badge-large { padding: 8px 15px; border-radius: 25px; font-size: 14px; font-weight: bold; display: inline-block; width: 85%; }
        .badge-yes { background: rgba(46, 204, 113, 0.15); color: var(--success); }
        .badge-no { background: rgba(231, 76, 60, 0.15); color: var(--danger); }
        .badge-queue { color: white; width: auto; padding: 8px 25px; }
        
        .time-tag { display: block; font-size: 11px; color: var(--text-muted); margin-top: 8px; font-weight: bold; }

        /* Update Section */
        .update-section { background: var(--update-box); padding: 20px; }
        .update-section h4 { margin: 0 0 15px 0; font-size: 15px; text-align: center; color: var(--primary); }
        .update-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: var(--meta-bg); padding: 10px 15px; border-radius: 8px; }
        .update-row:last-child { margin-bottom: 0; }
        .update-label { font-weight: bold; font-size: 14px; width: 35%; }
        
        .btn-group { display: flex; gap: 8px; width: 65%; }
        .btn { border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; flex: 1; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-yes { background: var(--success); color: white; box-shadow: 0 2px 5px rgba(46, 204, 113, 0.3); }
        .btn-no { background: var(--danger); color: white; box-shadow: 0 2px 5px rgba(231, 76, 60, 0.3); }
        
        .btn-q-small { background: var(--success); color: white; }
        .btn-q-normal { background: var(--warning); color: white; }
        .btn-q-large { background: var(--danger); color: white; }

        .meta-info { padding: 15px; font-size: 13px; color: var(--text-muted); text-align: center; background: var(--meta-bg); border-top: 1px solid var(--border-color); line-height: 1.8; }
        #status-msg { text-align: center; color: var(--primary); font-weight: bold; margin-bottom: 15px; min-height: 20px; }

        @media (max-width: 480px) {
            .update-row { flex-direction: column; gap: 10px; align-items: flex-start; }
            .update-label { width: 100%; text-align: center; }
            .btn-group { width: 100%; }
            .status-item { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div id="visitorCountBadge" class="visitor-badge">👁️ Visitor: ...</div>
        <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
    </div>

    <h1>⛽ Fuel Status LK</h1>
    <div id="status-msg">ස්ථානය පරීක්ෂා කරමින්...</div>
    <div id="stationList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Theme Toggle
    const themeBtn = document.getElementById('themeToggle');
    themeBtn.addEventListener('click', () => {
        const isDark = document.documentElement.toggleAttribute('data-theme');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        themeBtn.innerText = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
    });
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeBtn.innerText = '☀️ Light Mode';
    }

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyD_m49w7qdX0e-Jt6fZYh91_QAMQOmoWfU",
        authDomain: "fuel-portal-lk.firebaseapp.com",
        projectId: "fuel-portal-lk",
        storageBucket: "fuel-portal-lk.firebasestorage.app",
        messagingSenderId: "42488896193",
        appId: "1:42488896193:web:dec2dd13504d03b8691240"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let myStation = null, userLat = null, userLon = null;

    function getDistance(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return null; 
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
    }

    async function trackVisitor(stationId) {
        if (!sessionStorage.getItem('visited_' + stationId)) {
            try {
                await setDoc(doc(db, "fuel_stations", stationId), { 
                    visitorCount: increment(1) 
                }, { merge: true });
                sessionStorage.setItem('visited_' + stationId, 'true');
            } catch(e) {}
        }
    }

    async function initApp() {
        try {
            const res = await fetch('fuel_stations_v3_gps.json');
            const data = await res.json();
            myStation = Array.isArray(data) ? data[0] : data; 

            await trackVisitor(myStation.id);

            navigator.geolocation.getCurrentPosition(pos => {
                userLat = pos.coords.latitude; userLon = pos.coords.longitude;
                document.getElementById('status-msg').innerText = "";
                renderStation();
            }, () => {
                document.getElementById('status-msg').innerText = "⚠️ ස්ථානය ලබාගත නොහැක.";
                renderStation();
            });
        } catch (e) { document.getElementById('status-msg').innerText = "දත්ත දෝෂයකි!"; }
    }

    function formatTime(timestamp) {
        return timestamp ? timestamp.toDate().toLocaleString('si-LK') : "තාම නැත";
    }

    async function renderStation() {
        const listDiv = document.getElementById('stationList');
        const docRef = doc(db, "fuel_stations", myStation.id);
        const docSnap = await getDoc(docRef);
        let fbData = docSnap.exists() ? docSnap.data() : { petrol: false, diesel: false, updateCount: 0, visitorCount: 0 };

        const distance = getDistance(userLat, userLon, myStation.latitude, myStation.longitude);
        
        const petrolTime = formatTime(fbData.petrolUpdated);
        const dieselTime = formatTime(fbData.dieselUpdated);
        const pQueueTime = formatTime(fbData.petrolQueueUpdated);
        const dQueueTime = formatTime(fbData.dieselQueueUpdated);

        document.getElementById('visitorCountBadge').innerHTML = `👁️ Visitor: <b>${fbData.visitorCount || 1}</b>`;

        // Petrol Queue Colors
        let pQColor = '#7f8c8d'; 
        if(fbData.petrolQueueStatus === 'පොඩි') pQColor = 'var(--success)';
        if(fbData.petrolQueueStatus === 'සාමාන්‍ය') pQColor = 'var(--warning)';
        if(fbData.petrolQueueStatus === 'ලොකු') pQColor = 'var(--danger)';

        // Diesel Queue Colors
        let dQColor = '#7f8c8d'; 
        if(fbData.dieselQueueStatus === 'පොඩි') dQColor = 'var(--success)';
        if(fbData.dieselQueueStatus === 'සාමාන්‍ය') dQColor = 'var(--warning)';
        if(fbData.dieselQueueStatus === 'ලොකු') dQColor = 'var(--danger)';

        listDiv.innerHTML = `
            <div class="station-card">
                <div class="station-header">
                    <h3>⛽ ${myStation.name}</h3>
                    <p>📍 ${myStation.location}</p>
                    ${distance ? `<div class="dist-tag">ඔබගේ සිට දුර: ${distance.toFixed(2)} km</div>` : ''}
                </div>

                <div class="current-status">
                    <h4>දැනට පවතින තත්ත්වය</h4>
                    <div class="status-grid">
                        <div class="status-item">
                            <h5>PETROL</h5>
                            <span class="badge-large ${fbData.petrol ? 'badge-yes' : 'badge-no'}">
                                ${fbData.petrol ? '✅ ඇත' : '❌ නැත'}
                            </span>
                            <span class="time-tag">⏱️ ${petrolTime}</span>
                        </div>
                        
                        <div class="status-item">
                            <h5>DIESEL</h5>
                            <span class="badge-large ${fbData.diesel ? 'badge-yes' : 'badge-no'}">
                                ${fbData.diesel ? '✅ ඇත' : '❌ නැත'}
                            </span>
                            <span class="time-tag">⏱️ ${dieselTime}</span>
                        </div>

                        <div class="status-item">
                            <h5>පෙට්‍රල් පෝලිම</h5>
                            <span class="badge-large badge-queue" style="background-color: ${pQColor};">
                                ${fbData.petrolQueueStatus || 'දත්ත නැත'}
                            </span>
                            <span class="time-tag">⏱️ ${pQueueTime}</span>
                        </div>

                        <div class="status-item">
                            <h5>ඩීසල් පෝලිම</h5>
                            <span class="badge-large badge-queue" style="background-color: ${dQColor};">
                                ${fbData.dieselQueueStatus || 'දත්ත නැත'}
                            </span>
                            <span class="time-tag">⏱️ ${dQueueTime}</span>
                        </div>
                    </div>
                </div>

                <div class="update-section">
                    <h4>ඔබ දැන් සෙඩ් එකේද ඉන්නේ? තත්ත්වය යාවත්කාලීන කරන්න 👇</h4>
                    
                    <div class="update-row">
                        <div class="update-label">PETROL:</div>
                        <div class="btn-group">
                            <button class="btn btn-yes" onclick="updateFuelStatus('petrol', true)">✔ තියෙනවා</button>
                            <button class="btn btn-no" onclick="updateFuelStatus('petrol', false)">✖ ඉවරයි</button>
                        </div>
                    </div>

                    <div class="update-row">
                        <div class="update-label">DIESEL:</div>
                        <div class="btn-group">
                            <button class="btn btn-yes" onclick="updateFuelStatus('diesel', true)">✔ තියෙනවා</button>
                            <button class="btn btn-no" onclick="updateFuelStatus('diesel', false)">✖ ඉවරයි</button>
                        </div>
                    </div>

                    <div class="update-row">
                        <div class="update-label">පෙට්‍රල් පෝලිම:</div>
                        <div class="btn-group">
                            <button class="btn btn-q-small" onclick="updateQueue('petrolQueue', 'පොඩි')">පොඩි</button>
                            <button class="btn btn-q-normal" onclick="updateQueue('petrolQueue', 'සාමාන්‍ය')">සාමාන්‍ය</button>
                            <button class="btn btn-q-large" onclick="updateQueue('petrolQueue', 'ලොකු')">ලොකු</button>
                        </div>
                    </div>

                    <div class="update-row">
                        <div class="update-label">ඩීසල් පෝලිම:</div>
                        <div class="btn-group">
                            <button class="btn btn-q-small" onclick="updateQueue('dieselQueue', 'පොඩි')">පොඩි</button>
                            <button class="btn btn-q-normal" onclick="updateQueue('dieselQueue', 'සාමාන්‍ය')">සාමාන්‍ය</button>
                            <button class="btn btn-q-large" onclick="updateQueue('dieselQueue', 'ලොකු')">ලොකු</button>
                        </div>
                    </div>
                </div>

                <div class="meta-info">
                    <p>👥 පුද්ගලයින් <b>${fbData.updateCount || 0}</b> ක් තහවුරු කර ඇත</p>
                </div>
            </div>`;
    }

    // Fuel Status Update
    window.updateFuelStatus = async function(type, status) {
        if(!confirm("ඔබ මෙම තොරතුර තහවුරු කරනවාද?")) return;
        document.getElementById('status-msg').innerText = "යාවත්කාලීන කරමින්...";
        
        try {
            await setDoc(doc(db, "fuel_stations", myStation.id), { 
                [type]: status, 
                [type + 'Updated']: serverTimestamp(), 
                updateCount: increment(1) 
            }, { merge: true });
            
            document.getElementById('status-msg').innerText = "✅ සාර්ථකව යාවත්කාලීන විය!";
            setTimeout(() => document.getElementById('status-msg').innerText = "", 3000);
            renderStation();
        } catch(e) {
            document.getElementById('status-msg').innerText = "⚠️ දෝෂයක් හටගත්තා!";
        }
    };

    // Queue Update (වෙනස් කරන ලදී)
    window.updateQueue = async function(queueType, qStatus) {
        let typeName = queueType === 'petrolQueue' ? 'පෙට්‍රල්' : 'ඩීසල්';
        if(!confirm(`${typeName} පෝලිමේ තත්ත්වය '${qStatus}' ලෙස යාවත්කාලීන කරනවාද?`)) return;
        
        document.getElementById('status-msg').innerText = "යාවත්කාලීන කරමින්...";
        
        try {
            await setDoc(doc(db, "fuel_stations", myStation.id), { 
                [queueType + 'Status']: qStatus, 
                [queueType + 'Updated']: serverTimestamp(), 
                updateCount: increment(1) 
            }, { merge: true });
            
            document.getElementById('status-msg').innerText = "✅ සාර්ථකව යාවත්කාලීන විය!";
            setTimeout(() => document.getElementById('status-msg').innerText = "", 3000);
            renderStation();
        } catch(e) {
            document.getElementById('status-msg').innerText = "⚠️ දෝෂයක් හටගත්තා!";
        }
    };

    let lastNotifiedHour = -1;
    async function checkAndNotify() {
        const now = new Date();
        const currentHour = now.getHours();
        const targetHours = [9, 12, 15, 18];

        if (targetHours.includes(currentHour) && lastNotifiedHour !== currentHour) {
            const docSnap = await getDoc(doc(db, "fuel_stations", myStation.id));
            if (docSnap.exists()) {
                const data = docSnap.data();
                const p = data.petrol ? "✅ ඇත" : "✖ නැත";
                const d = data.diesel ? "✅ ඇත" : "✖ නැත";
                
                if (Notification.permission === "granted") {
                    new Notification(`⛽ ${myStation.name} තත්ත්වය`, {
                        body: `පෙට්‍රල්: ${p} | ඩීසල්: ${d}\nසජීවීව බැලීමට ක්ලික් කරන්න.`,
                        icon: "https://cdn-icons-png.flaticon.com/512/3204/3204073.png"
                    });
                }
            }
            lastNotifiedHour = currentHour;
        }
    }

    setTimeout(() => {
        if (Notification.permission === "default") Notification.requestPermission();
    }, 5000);

    setInterval(checkAndNotify, 60000);
    initApp();
</script>
</body>
</html>
