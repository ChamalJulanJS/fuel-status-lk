<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Status LK - ළඟම සෙඩ් සොයන්න</title>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --danger: #e74c3c; --dark: #2c3e50; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        h1 { text-align: center; color: var(--dark); font-size: 24px; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 15px; font-size: 16px; border: 2px solid #ddd; border-radius: 25px; margin-bottom: 10px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .search-box:focus { border-color: var(--primary); }
        .loc-btn { width: 100%; padding: 14px; border-radius: 25px; background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; transition: 0.2s; }
        .loc-btn:hover { background: #2980b9; }
        
        .station-card { background: white; padding: 18px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #ddd; position: relative; }
        .nearest-card { border-left-color: var(--success); background: #f0fff4; }
        .dist-tag { display: inline-block; background: #e1f5fe; color: #0288d1; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-top: 8px; }
        
        .station-info h3 { margin: 0; color: var(--dark); font-size: 18px; }
        .station-info p { margin: 5px 0; color: #666; font-size: 14px; }
        .status-row { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee; }
        .fuel-type { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 48%; }
        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; width: 70px; text-align: center; }
        .available { background-color: var(--success); color: white; }
        .unavailable { background-color: var(--danger); color: white; }
        .btn-group { display: flex; gap: 5px; }
        .btn { border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .btn-yes { background: #e8f5e9; color: var(--success); border: 1px solid var(--success); }
        .btn-no { background: #ffebee; color: var(--danger); border: 1px solid var(--danger); }
        #status-msg { text-align: center; color: var(--primary); font-weight: bold; margin-bottom: 15px; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⛽ Fuel Status LK</h1>
    <input type="text" id="searchInput" class="search-box" placeholder="සෙඩ් එකේ නම හෝ නගරය සර්ච් කරන්න...">
    <button class="loc-btn" onclick="findNearestStations()">📍 මට ළඟම සෙඩ් 3 සොයන්න</button>
    <div id="status-msg">දත්ත පූරණය වෙමින් පවතී...</div>
    <div id="stationList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD_m49w7qdX0e-Jt6fZYh91_QAMQOmoWfU",
        authDomain: "fuel-portal-lk.firebaseapp.com",
        projectId: "fuel-portal-lk",
        storageBucket: "fuel-portal-lk.firebasestorage.app",
        messagingSenderId: "42488896193",
        appId: "1:42488896193:web:dec2dd13504d03b8691240"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allStations = [];

    // --- පෘථිවියේ අක්ෂාංශ දේශාංශ අනුව දුර මනින ගණිත සූත්‍රය ---
    function getDistance(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lon1 || !lat2 || !lon2) return Infinity; // GPS දත්ත නැති සෙඩ් අත්හැරීම
        const R = 6371; // පෘථිවියේ අරය කිලෝමීටර් වලින්
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c; // දුර කිලෝමීටර් වලින්
    }

    async function fetchAllData() {
        try {
            const querySnapshot = await getDocs(collection(db, "fuel_stations"));
            allStations = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            document.getElementById('status-msg').innerText = "";
            displayStations(allStations.slice(0, 20));
        } catch (error) {
            document.getElementById('status-msg').innerText = "Error: " + error.message;
        }
    }

    // සෙඩ් ලැයිස්තුව පෙන්වන කොටස (isNearest = true නම් ලස්සනට පෙන්වයි)
    function displayStations(list, isNearest = false) {
        const listDiv = document.getElementById('stationList');
        if(list.length === 0) {
            listDiv.innerHTML = "<p style='text-align:center;'>සෙඩ් හමු වූයේ නැත.</p>";
            return;
        }

        listDiv.innerHTML = list.map((s, index) => `
            <div class="station-card ${isNearest ? 'nearest-card' : ''}">
                <div class="station-info">
                    <h3>${isNearest ? `#${index + 1} ` : ''}${s.name || 'නමක් නැත'}</h3>
                    <p>📍 ${s.location || 'ලිපිනය නැත'}</p>
                    ${s.distance && s.distance !== Infinity ? `<span class="dist-tag">🚩 ඔබේ සිට දුර: ${s.distance.toFixed(2)} km</span>` : ''}
                </div>
                <div class="status-row">
                    <div class="fuel-type">
                        <span class="status-badge ${s.petrol ? 'available' : 'unavailable'}">PETROL</span>
                        <div class="btn-group">
                            <button class="btn btn-yes" onclick="updateFuelStatus('${s.id}', 'petrol', true)">✔</button>
                            <button class="btn btn-no" onclick="updateFuelStatus('${s.id}', 'petrol', false)">✖</button>
                        </div>
                    </div>
                    <div class="fuel-type">
                        <span class="status-badge ${s.diesel ? 'available' : 'unavailable'}">DIESEL</span>
                        <div class="btn-group">
                            <button class="btn btn-yes" onclick="updateFuelStatus('${s.id}', 'diesel', true)">✔</button>
                            <button class="btn btn-no" onclick="updateFuelStatus('${s.id}', 'diesel', false)">✖</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // --- 📍 ළඟම සෙඩ් 3 හොයන ප්‍රධාන Function එක ---
    window.findNearestStations = function() {
        if (!navigator.geolocation) return alert("Location පහසුකම නැත.");
        
        // සර්ච් බොක්ස් එක හිස් කරනවා පටලවා නොගන්න
        document.getElementById('searchInput').value = ''; 
        document.getElementById('status-msg').innerText = "ඔබගේ ස්ථානය පරීක්ෂා කරමින්... කරුණාකර රැඳී සිටින්න.";

        navigator.geolocation.getCurrentPosition((pos) => {
            const userLat = pos.coords.latitude;
            const userLon = pos.coords.longitude;

            // 1. හැම සෙඩ් එකකටම දුර මනිනවා
            const stationsWithDistance = allStations.map(s => {
                // Firebase එකේ latitude, longitude තියෙනවද බලනවා
                const dist = getDistance(userLat, userLon, s.latitude, s.longitude);
                return { ...s, distance: dist };
            });

            // 2. දුර අඩුවෙන් තියෙන ඒවා උඩට එන්න Sort කරනවා
            stationsWithDistance.sort((a, b) => a.distance - b.distance);

            // 3. ළඟම තියෙන 3 විතරක් ගන්නවා
            const nearest3 = stationsWithDistance.slice(0, 3);
            
            document.getElementById('status-msg').innerText = "ඔබට ළඟම සෙඩ් 3 මෙන්න!";
            
            // 4. ඒ 3 ලස්සනට පෙන්වනවා
            displayStations(nearest3, true);

        }, (err) => {
            document.getElementById('status-msg').innerText = "";
            alert("ස්ථානය ලබා ගැනීමට අවසර දෙන්න.");
        });
    }

    // දත්ත යාවත්කාලීන කිරීම (Update Status)
    window.updateFuelStatus = async function(id, fuelType, status) {
        if(!confirm("ඔබ මෙම තොරතුර තහවුරු කරනවාද?")) return;
        const stationRef = doc(db, "fuel_stations", id);
        try {
            await updateDoc(stationRef, { [fuelType]: status, lastUpdated: new Date() });
            alert("යාවත්කාලීන විය!");
            fetchAllData(); 
        } catch (e) { alert("Error!"); }
    }

    // සාමාන්‍ය සෙවුම (Search Box)
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        if(term === "") {
            displayStations(allStations.slice(0, 20));
            return;
        }
        const filtered = allStations.filter(s => (s.name || "").toLowerCase().includes(term) || (s.location || "").toLowerCase().includes(term));
        displayStations(filtered);
    });

    fetchAllData();
</script>

</body>
</html>
